        <label>
            <input type="radio" name="question1" value="mingi">

            <input type="radio" name="question1" value="hongjoong">

        </label>
         <label>
            <input type="radio" name="question1" value="yeosang,jongho">

        </label>
        <label>
            <input type="radio" name="question1" value="san">

        </label>
        <label>
            <input type="radio" name="question1" value="yunho,seonghwa">

        </label>
        <label>
            <input type="radio" name="question1" value="wooyoung">

        </label>      
   
    </div>
